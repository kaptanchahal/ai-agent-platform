server:
  port: 8081

spring:
  application:
    name : ai-agent-platform
  datasource:
    url: jdbc:postgresql://localhost:5432/ai-agent-platform
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen2.5:7b
          temperature: 0.1

  